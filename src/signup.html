<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign Up — Scrivlo</title>
<meta name="robots" content="noindex"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="auth-page">
<div class="auth-card">
<div style="text-align:center;margin-bottom:1.5rem"><a href="/" style="font-weight:800;font-size:1.2rem;color:#0a0a0f">Scrivlo</a></div>
<h2>Create your account</h2>
<p class="auth-sub">Generate AI drafts in 30 seconds. Free forever.</p>
<div class="form-error" id="err"></div>
<form onsubmit="go(event)">
<div class="form-group"><label>Email</label><input type="email" id="em" placeholder="you@example.com" required autocomplete="email"/></div>
<div class="form-group"><label>Password</label><input type="password" id="pw" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password"/></div>
<button type="submit" class="auth-submit" id="btn">Create free account</button>
</form>
<div class="auth-switch">Already have an account? <a href="/login">Sign in</a></div>
</div>
</div>
<script>
async function go(e){
e.preventDefault();
const btn=document.getElementById('btn');
const err=document.getElementById('err');
btn.disabled=true;btn.textContent='Creating...';
err.classList.remove('visible');
try{
const r=await fetch('/api/auth?action=signup',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({email:document.getElementById('em').value.trim(),password:document.getElementById('pw').value})});
const d=await r.json();
if(!r.ok){err.textContent=d.message||'Sign up failed';err.classList.add('visible');btn.disabled=false;btn.textContent='Create free account';return;}
if(d.token)localStorage.setItem('scrivlo_token',d.token);
if(d.user)localStorage.setItem('scrivlo_user',JSON.stringify(d.user));
window.location.href='/dashboard';
}catch(ex){err.textContent='Network error.';err.classList.add('visible');btn.disabled=false;btn.textContent='Create free account';}
}
</script>
</body>
</html>
